name: Spec Fixtures

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout go-toon
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Checkout official TOON spec
        uses: actions/checkout@v4
        with:
          repository: toon-format/spec
          path: .tmp/toon-spec

      - name: Run spec fixture tests
        env:
          TOON_SPEC_PATH: ${{ github.workspace }}/.tmp/toon-spec
        run: go test ./... -run TestSpecFixtures -count=1 -v
